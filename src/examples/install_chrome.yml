description: |
  Install Google's Chrome browser and ChromeDriver in the node variant image
usage:
  version: 2.1
  orbs:
    browser-tools: circleci/browser-tools@x.y
  jobs:
    test:
      docker:
        - image: cimg/node:lts-browsers # see https://circleci.com/developer/images/image/cimg/node for additional tags
      steps:
        - browser-tools/install_chrome:
            timeout: 5m
        - browser-tools/install_chromedriver:
            timeout: 5m
        - run:
            name: Check install
            command: |
              google-chrome --version
              chromedriver --version
